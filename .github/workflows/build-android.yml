name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      
      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true
        
      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
      
      - name: Add Android platform
        run: |
          cordova platform add android@latest
      
      - name: Patch Groovy 4 imports
        run: |
          # Fix XmlParser import for Groovy 4 (bundled with Gradle 8.x)
          for f in platforms/android/CordovaLib/cordova.gradle platforms/android/app/build.gradle; do
            if [ -f "$f" ] && grep -q "XmlParser" "$f" && ! grep -q "import groovy.xml.XmlParser" "$f"; then
              sed -i '1s/^/import groovy.xml.XmlParser\n/' "$f"
              echo "✅ Patched $f"
            fi
          done

      - name: Patch CordovaLib SDK version constants
        run: |
          # VANILLA_ICE_CREAM = API 35, BAKLAVA = API 36
          # Not defined in older SDK build tools — replace with numeric literals
          for f in \
            platforms/android/CordovaLib/src/org/apache/cordova/CoreAndroid.java \
            platforms/android/CordovaLib/src/org/apache/cordova/SystemBarPlugin.java \
            platforms/android/CordovaLib/src/org/apache/cordova/CordovaActivity.java; do
            if [ -f "$f" ]; then
              sed -i 's/Build\.VERSION_CODES\.VANILLA_ICE_CREAM/35/g' "$f"
              sed -i 's/Build\.VERSION_CODES\.BAKLAVA/36/g' "$f"
              echo "✅ Patched $f"
            fi
          done
      
      - name: Build debug APK
        run: |
          cordova build android --debug -- --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90
